      {

        photos: ['⛳']
      }
    ],
    includes: [
      '인터컨티넨탈 스탠다드 객실 1박',
      '회원제 골프장 18홀 또는 36홀 라운드 (2인)',

      '부대시설 10% 할인'
    ],
    prices: {

// ==================== 상태 ====================
let currentProducts = SAMPLE_PRODUCTS;
let currentProduct = null;
let currentMonth = new Date(2026, 2, 1);  // 2026년 3월 기본
let selectedDate = null;
let priceType = 'member';  // 'member' or 'public'

// ==================== 초기 로드 ====================
window.addEventListener('DOMContentLoaded', () => {
  loadProducts();
});

async function loadProducts() {
  // Supabase 연결되면 여기서 fetch
  // if (supabase) {
  //   const { data, error } = await supabase.from('alpensia_products').select('*');
  //   if (!error && data) currentProducts = data;
  // }
  
  renderProducts();
}

// ==================== 상품 목록 렌더링 ====================
function renderProducts() {
  const listEl = document.getElementById('productsList');
  
  if (!currentProducts || currentProducts.length === 0) {
    listEl.innerHTML = '<div class="loading">등록된 상품이 없습니다.</div>';
    return;
  }
  
  listEl.innerHTML = currentProducts.map(p => `
    <div class="product-card" onclick="showDetail(${p.id})">
      <div class="product-card-image">
        ${p.tag ? `<span class="product-tag">${p.tag}</span>` : ''}
        ${p.mainImage ? `<img src="${p.mainImage}" alt="${p.name}">` : `<span>${p.mainEmoji || '⛳'}</span>`}
      </div>
      <div class="product-card-body">
        <div class="product-number">${p.number}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-meta">
          <div class="product-meta-row">
            <span class="product-meta-label">이용기간</span>
            <span>${p.period}</span>
          </div>
          <div class="product-meta-row">
            <span class="product-meta-label">구성</span>
            <span>${p.included}</span>
          </div>
        </div>
        <div class="product-cta">
          <span>자세히 보기 · 예약 가능일 확인</span>
          <span class="product-cta-arrow">→</span>
        </div>
      </div>
    </div>
  `).join('');
}

// ==================== 상세 화면 ====================
function showDetail(productId) {
  currentProduct = currentProducts.find(p => p.id === productId);
  if (!currentProduct) return;
  
  // 기본값 설정
  selectedDate = null;
  priceType = currentProduct.prices.member ? 'member' : 'public';
  
  // 달력 시작월: 상품 이용기간 첫 날
  const [startYear, startMonth] = currentProduct.period.split('~')[0].trim().split('.');
  currentMonth = new Date(parseInt(startYear), parseInt(startMonth) - 1, 1);
  
  renderDetail();
  
  document.getElementById('listView').classList.add('hidden');
  document.getElementById('detailView').classList.add('active');
  window.scrollTo(0, 0);
}

function showList() {
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('listView').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function renderDetail() {
  const p = currentProduct;
  const el = document.getElementById('detailContent');
  
  el.innerHTML = `
    <!-- 상세 HERO -->
    <div class="detail-hero">
      <div class="detail-hero-inner container">
        <div class="detail-hero-tag">${p.number}</div>
        <h1 class="detail-hero-title">${p.name}</h1>
        <div class="detail-hero-meta">
          <div class="detail-hero-meta-row">
            <span class="detail-hero-meta-label">이용기간</span>
            <span>${p.period}</span>
          </div>
          ${p.periodNote ? `
          <div class="detail-hero-meta-row">
            <span class="detail-hero-meta-label">안내</span>
            <span>${p.periodNote}</span>
          </div>` : ''}
          <div class="detail-hero-meta-row">
            <span class="detail-hero-meta-label">구성</span>
            <span>${p.included}</span>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 호텔 소개 -->
    <div class="detail-section">
      <div class="container">
        <h2 class="detail-section-title">호텔 소개</h2>
        ${p.hotels.map(h => `
          <div class="info-card">
            <div class="info-card-photos">
              ${h.photos.map(ph => `
                <div class="info-card-photo">
                  ${typeof ph === 'string' && ph.startsWith('http') ? `<img src="${ph}">` : `<span>${ph}</span>`}
                </div>
              `).join('')}
            </div>
            <div class="info-card-name">${h.name}</div>
            <div class="info-card-desc">${h.desc}</div>
          </div>
        `).join('')}
      </div>
    </div>
    
    <!-- 골프장 소개 -->
    <div class="detail-section">
      <div class="container">
        <h2 class="detail-section-title">골프장 소개</h2>
        ${p.golfCourses.map(g => `
          <div class="info-card">
            <div class="info-card-photos">
              ${g.photos.map(ph => `
                <div class="info-card-photo">
                  ${typeof ph === 'string' && ph.startsWith('http') ? `<img src="${ph}">` : `<span>${ph}</span>`}
                </div>
              `).join('')}
            </div>
            <div class="info-card-name">${g.name}</div>
            <div class="info-card-desc">${g.desc}</div>
          </div>
        `).join('')}
      </div>
    </div>
    
    <!-- 포함사항 -->
    <div class="detail-section">
      <div class="container">
        <h2 class="detail-section-title">포함사항</h2>
        <ul class="include-list">
          ${p.includes.map(i => `<li>${i}</li>`).join('')}
        </ul>
      </div>
    </div>
    
    <!-- 달력 -->
    <div class="detail-section">
      <div class="container">
        <h2 class="detail-section-title">출발일 선택</h2>
        <div class="calendar" id="calendar"></div>
        <div id="priceCardWrap"></div>
      </div>
    </div>
  `;
  
  renderCalendar();
}

// ==================== 달력 ====================
function renderCalendar() {
  const p = currentProduct;
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  
  // 상품 이용기간 파싱
  const [startStr, endStr] = p.period.split('~').map(s => s.trim());
  const [sy, sm, sd] = startStr.split('.').map(Number);
  const [ey, em, ed] = endStr.split('.').map(Number);
  const startDate = new Date(sy, sm - 1, sd);
  const endDate = new Date(ey, em - 1, ed);
  
  // 첫 날과 마지막 날
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startWeekday = firstDay.getDay();
  const daysInMonth = lastDay.getDate();
  
  // 이전/다음 버튼 활성화 여부
  const prevMonth = new Date(year, month - 1, 1);
  const nextMonth = new Date(year, month + 1, 1);
  const prevDisabled = prevMonth < new Date(startDate.getFullYear(), startDate.getMonth(), 1);
  const nextDisabled = nextMonth > new Date(endDate.getFullYear(), endDate.getMonth(), 1);
  
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  
  let html = `
    <div class="calendar-header">
      <button class="calendar-nav" onclick="changeMonth(-1)" ${prevDisabled ? 'disabled' : ''}>‹</button>
      <div class="calendar-month">${year}년 ${monthNames[month]}</div>
      <button class="calendar-nav" onclick="changeMonth(1)" ${nextDisabled ? 'disabled' : ''}>›</button>
    </div>
    <div class="calendar-weekdays">
      <div class="calendar-weekday sun">일</div>
      <div class="calendar-weekday">월</div>
      <div class="calendar-weekday">화</div>
      <div class="calendar-weekday">수</div>
      <div class="calendar-weekday">목</div>
      <div class="calendar-weekday">금</div>
      <div class="calendar-weekday sat">토</div>
    </div>
    <div class="calendar-days">
  `;
  
  // 빈 칸
  for (let i = 0; i < startWeekday; i++) {
    html += '<div class="calendar-day empty"></div>';
  }
  
  // 날짜
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(year, month, d);
    const weekday = date.getDay();
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    
    const inRange = date >= startDate && date <= endDate;
    const weekdayOk = p.weekdays.includes(weekday);
    const notExcluded = !p.excludeDates.includes(dateStr);
    const available = inRange && weekdayOk && notExcluded;
    const isSelected = selectedDate === dateStr;
    
    let cls = 'calendar-day';
    if (available) cls += ' available';
    else cls += ' disabled';
    if (weekday === 0) cls += ' sun';
    if (weekday === 6) cls += ' sat';
    if (isSelected) cls += ' selected';
    
    const onclick = available ? `onclick="selectDate('${dateStr}')"` : '';
    html += `<button class="${cls}" ${onclick} ${!available ? 'disabled' : ''}>${d}</button>`;
  }
  
  html += `
    </div>
    <div class="calendar-legend">
      <div class="calendar-legend-item">
        <span class="calendar-legend-dot legend-available"></span> 예약가능
      </div>
      <div class="calendar-legend-item">
        <span class="calendar-legend-dot legend-selected"></span> 선택됨
      </div>
    </div>
  `;
  
  document.getElementById('calendar').innerHTML = html;
}

function changeMonth(delta) {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + delta, 1);
  renderCalendar();
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  renderCalendar();
  renderPriceCard();
}

// ==================== 요금 카드 ====================
function renderPriceCard() {
  if (!selectedDate) return;
  
  const p = currentProduct;
  const date = new Date(selectedDate);
  const weekday = date.getDay();
  const isWeekend = weekday === 0 || weekday === 6 || weekday === 5;  // 금토일 주말 처리
  
  const hasMember = !!p.prices.member;
  const hasPublic = !!p.prices.public;
  
  // 현재 선택된 요금 타입이 가능한지 확인
  if (priceType === 'member' && !hasMember) priceType = 'public';
  if (priceType === 'public' && !hasPublic) priceType = 'member';
  
  const priceData = p.prices[priceType];
  const price = isWeekend ? priceData.weekend : priceData.weekday;
  
  const weekdayNames = ['일','월','화','수','목','금','토'];
  const dateDisplay = `${date.getFullYear()}년 ${date.getMonth()+1}월 ${date.getDate()}일 (${weekdayNames[weekday]})`;
  
  const html = `
    <div class="price-card show">
      <div class="price-card-inner">
        <div class="price-date">${dateDisplay}</div>
        
        ${hasMember && hasPublic ? `
        <div class="price-toggle">
          <button class="price-toggle-btn ${priceType === 'member' ? 'active' : ''}" onclick="togglePriceType('member')">회원제</button>
          <button class="price-toggle-btn ${priceType === 'public' ? 'active' : ''}" onclick="togglePriceType('public')">대중제</button>
        </div>
        ` : ''}
        
        <div class="price-label">${priceType === 'member' ? '회원제' : '대중제'} · ${isWeekend ? '주말요금' : '평일요금'} · 1인 기준</div>
        <div class="price-amount">
          <span class="price-amount-value">${price.toLocaleString()}</span>
          <span class="price-amount-unit">원~</span>
        </div>
        <div class="price-note">* 정확한 요금은 카톡 문의 시 확정됩니다</div>
        
        <a href="${KAKAO_CHANNEL_URL}" target="_blank" class="kakao-btn">
          <span class="kakao-icon">K</span>
          <span>카카오톡으로 바로 문의하기</span>
        </a>
      </div>
    </div>
  `;
  
  document.getElementById('priceCardWrap').innerHTML = html;
  // 요금 카드로 부드럽게 스크롤
  setTimeout(() => {
    document.querySelector('.price-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

function togglePriceType(type) {
  priceType = type;
  renderPriceCard();
}
</script>
